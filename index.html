<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POD TCG Pack Opening</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/pack_tcg_op_1.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header>
            <h1>POD TCG Simulator</h1>
            <nav
                style="display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto;">
                <div class="nav-links" style="display: flex;">
                    <button onclick="showSection('opening')">เปิดซอง</button>
                    <button onclick="showSection('collection')">สมุดการ์ด</button>
                </div>
                <div class="auth-section" style="display: flex; align-items: center;">
                    <button id="login-btn"
                        onclick="window.location.href='https://discord.com/oauth2/authorize?client_id=1485982724463525951&response_type=code&redirect_uri=http%3A%2F%2Flocalhost%3A3000%2Fauth%2Fdiscord%2Fcallback&scope=identify%20guilds.members.read'">เข้าสู่ระบบ</button>
                    <!-- Profile Display After Login -->
                    <div id="user-profile" style="display: none; align-items: center; gap: 10px;">
                        <img id="user-avatar" src="" alt="Avatar" width="32" height="32"
                            style="border-radius: 50%; border: 2px solid white;">
                        <span id="user-name"
                            style="color: white; font-weight: bold; font-family: 'Kanit', sans-serif;"></span>
                        <button class="btn-primary" style="padding: 5px 10px; font-size: 0.9em;"
                            onclick="logout()">ออกจากระบบ</button>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <section id="opening-section" class="active">
                <div class="pack-container">
                    <div id="pack-visual" class="pack-visual" onclick="startOpening()">
                        <div class="pack-shaker">
                            <div class="pack-half top">
                                <img src="./assets/pack_tcg_op_1.png" alt="TCG Pack">
                            </div>
                            <div class="pack-half bottom">
                                <img src="./assets/pack_tcg_op_1.png" alt="TCG Pack">
                            </div>
                        </div>
                        <div class="pack-glow"></div>
                    </div>
                    <button id="open-btn" class="btn-primary" style="display: none;">เปิดซอง (5 ใบ)</button>
                </div>
                <div id="cards-display" class="cards-grid"></div>
            </section>

            <section id="collection-section">
                <div class="collection-header">
                    <h2>Collection (<span id="collected-count">0</span>/<span id="total-count">0</span>)</h2>
                    <div class="filters">
                        <button onclick="filterCollection('ALL')">ทั้งหมด</button>
                        <button onclick="filterCollection('SSSSR')">SSSSR</button>
                        <button onclick="filterCollection('SSSR')">SSSR</button>
                        <button onclick="filterCollection('SSR')">SSR</button>
                        <button onclick="filterCollection('SR')">SR</button>
                        <button onclick="filterCollection('R')">R</button>
                        <button onclick="filterCollection('C')">C</button>
                    </div>
                </div>
                <div id="collection-grid" class="cards-grid"></div>
            </section>
        </main>

        <!-- Logout Confirmation Dialog -->
        <div id="logout-dialog" class="logout-dialog-overlay">
            <div class="logout-dialog-box">
                <div class="logout-dialog-icon"></div>
                <h3>ออกจากระบบ</h3>
                <p>คุณต้องการออกจากระบบใช่หรือไม่?</p>
                <div class="logout-dialog-actions">
                    <button class="logout-btn-cancel" onclick="closeLogoutDialog()">ยกเลิก</button>
                    <button class="logout-btn-confirm" onclick="confirmLogout()">ออกจากระบบ</button>
                </div>
            </div>
        </div>

        <!-- GOD PACK Dialog -->
        <div id="godpack-dialog" class="godpack-dialog-overlay">
            <div class="godpack-dialog-box">
                <div class="godpack-stars">✦ ✦ ✦</div>
                <div class="godpack-title">GOD PACK</div>
                <div class="godpack-subtitle">DETECTED!</div>
                <p class="godpack-desc">คุณได้รับ God Pack!<br>การ์ดทุกใบในซองนี้คือ SR ขึ้นไปทั้งหมด!</p>
                <button class="godpack-btn" onclick="closeGodpackDialog()">รับการ์ด!</button>
            </div>
        </div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div id="modal-card-detail"></div>
            </div>
        </div>
    </div>

    <!-- Data and Scripts -->
    <script src="data/cards.js"></script>
    <script src="script.js"></script>
</body>

</html>
