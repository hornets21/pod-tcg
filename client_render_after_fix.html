        .spin-area-container {
          flex: 1;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          position: relative;
          padding: 2rem;
        }

        /* 3D CSS WHEEL SPINNER */
        .wheel-container-3d {
          position: relative;
          width: 340px;
          height: 340px;
          perspective: 1000px;
          margin-bottom: 3rem;
        }

        .wheel-shadow {
          position: absolute;
          width: 90%;
          height: 90%;
          left: 5%;
          top: 8%;
          background: rgba(0, 0, 0, 0.65);
          border-radius: 50%;
          filter: blur(15px);
          transform: translateY(24px) rotateX(45deg) scale(0.95);
          z-index: 1;
          pointer-events: none;
        }

        .wheel-pointer {
          position: absolute;
          top: -15px;
          left: 50%;
          transform: translateX(-50%) translateZ(25px);
          width: 0;
          height: 0;
          border-left: 12px solid transparent;
          border-right: 12px solid transparent;
          border-top: 24px solid #f43f5e;
          filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
          z-index: 10;
          pointer-events: none;
        }

        .wheel-plate {
          position: relative;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          border: 10px solid #1e293b;
          box-shadow: 
            0 10px 30px rgba(0, 0, 0, 0.7),
            0 0 0 3px #38bdf8,
            inset 0 0 20px rgba(0,0,0,0.8);
          transform-style: preserve-3d;
          transform: rotateX(45deg) rotate(0deg);
          transition: transform 5s cubic-bezier(0.1, 0.8, 0.1, 1);
          z-index: 2;
          overflow: hidden;
        }

        .wheel-sector-text {
          position: absolute;
          left: 50%;
          top: 50%;
          transform-origin: 0 50%;
          width: 145px;
          text-align: right;
          margin-top: -10px;
          padding-right: 25px;
          font-size: 0.82rem;
          font-weight: 700;
          color: white;
          text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9), 0 0 4px rgba(0,0,0,0.8);
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          pointer-events: none;
        }

        .wheel-center-cap {
          position: absolute;
          width: 54px;
          height: 54px;
          background: radial-gradient(circle, #38bdf8 0%, #0284c7 50%, #0f172a 100%);
          border: 3.5px solid #38bdf8;
          border-radius: 50%;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%) translateZ(20px);
          box-shadow: 0 3px 8px rgba(0,0,0,0.6), 0 0 10px rgba(56, 189, 248, 0.5);
          z-index: 5;
          pointer-events: none;
        }

        .spin-button-container {
          z-index: 10;
        }

        .spin-trigger-btn {
          background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
          color: white;
          border: 2px solid #38bdf8;
          font-size: 1.2rem;
          font-weight: bold;
          padding: 0.9rem 2.8rem;
          border-radius: 50px;
          cursor: pointer;
          box-shadow: 0 0 20px rgba(56, 189, 248, 0.35), inset 0 2px 4px rgba(255, 255, 255, 0.25);
          transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
          text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        .spin-trigger-btn:hover:not(:disabled) {
          transform: scale(1.06);
          box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
        }

        .spin-trigger-btn:active:not(:disabled) {
          transform: scale(0.96);
        }

        .spin-trigger-btn:disabled {
          background: #475569;
          border-color: #64748b;
          color: #94a3b8;
          cursor: not-allowed;
          box-shadow: none;
        }
